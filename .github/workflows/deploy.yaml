name: Deploy

on:
  push:
    branches: [week4]


jobs:
  checks:
    uses: ./.github/workflows/type-check.yaml

  build:
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [back]
        include:
          - service: front
            vite-api-url: ${{ vars.VITE_API_URL }}
      fail-fast: false
    env:
      IMAGE_SHA_NAME: '${{ vars.DOCKER_USERNAME }}/todo-${{ matrix.service }}:sha-${{ github.sha }}'
      IMAGE_LATEST_NAME: '${{ vars.DOCKER_USERNAME }}/todo-${{ matrix.service }}:latest'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        id: push
        run: |
          if [[ ${{ matrix.service }} == "front" ]]; then
            docker build --build-arg VITE_API_URL=${{ matrix.vite-api-url }} -t $IMAGE_SHA_NAME -t $IMAGE_LATEST_NAME ${{ matrix.service }}
          else
            docker build -t $IMAGE_SHA_NAME -t $IMAGE_LATEST_NAME ${{ matrix.service }}
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push to Docker Hub
        run: |
          docker push $IMAGE_SHA_NAME |
          docker push $IMAGE_LATEST_NAME

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/todo
            sed -i "s|^APP_VERSION=.*|APP_VERSION=sha-${{ github.sha }}|" .env.development.compose
            docker compose pull back front
            docker compose up -d --no-deps back front

  notify:
    needs: [checks, build, deploy]
    runs-on: ubuntu-latest
    if: always()
    env:
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - run: |
          CHECK_RESULT=${{ needs.checks.result }}
          BUILD_RESULT=${{ needs.build.result }}
          DEPLOY_RESULT=${{ needs.deploy.result }}
          
          GITHUB_ERROR_INFO="${{ github.repository }} @ ${{ github.ref_name }}%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        
          if [[ "$CHECK_RESULT" != "success" ]]; then
            TEXT="‚ùå Type-check —É–ø–∞–ª%0A$GITHUB_ERROR_INFO"
          elif [[ "$BUILD_RESULT" != "success" ]]; then
            TEXT="‚ùå Build —É–ø–∞–ª%0A$GITHUB_ERROR_INFO"
          elif [[ "$DEPLOY" != "success" ]]; then
            TEXT="‚ùå Deploy —É–ø–∞–ª%0A$GITHUB_ERROR_INFO"
          else
            TEXT="‚úÖ –î–µ–ø–ª–æ–π —É—Å–ø–µ—à–µ–Ω%0A${{ github.repository }} @ ${{ github.ref_name }}%0AActor: ${{ github.actor }}%0AVersion: sha-${{ github.sha }}"
          fi
          
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d "chat_id=$TELEGRAM_CHAT_ID" \
          -d "text=$TEXT" \
          -d "disable_web_page_preview=true")
          
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "Telegram API rejected"; exit 1; }
